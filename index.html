<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>形势与政策课程 · 小白牙智慧助教系统</title>
    
    <style>
        :root {
            --bg: #ffffff;
            --surface: #ffffff;
            --surface-muted: #faf9fc;
            --surface-soft: #f8f5fc;
            --surface-soft-2: #f4eefb;
            --border: #e6e1ee;
            --border-strong: #d6cde3;
            --text: #1f2328;
            --text-secondary: #495261;
            --text-muted: #6b7280;
            --th-purple: #5f3b8c;
            --th-purple-hover: #532f80;
            --th-purple-soft: rgba(95, 59, 140, 0.08);
            --th-purple-soft-strong: rgba(95, 59, 140, 0.14);
            --shadow-sm: 0 1px 2px rgba(24, 24, 27, 0.04);
            --shadow-md: 0 12px 28px rgba(95, 59, 140, 0.08);
            --radius-xl: 22px;
            --radius-lg: 18px;
            --radius-md: 14px;
            --radius-sm: 12px;
            --control-h: 48px;
            --button-w: 150px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            background: var(--bg);
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Inter', 'Roboto', 'Noto Sans CJK SC', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 24px 12px 36px;
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1920px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            border-color: var(--border-strong);
            box-shadow: var(--shadow-md);
        }

        .card-header {
            background: var(--th-purple);
            padding: 20px 24px;
            border-bottom: 1px solid var(--th-purple);
        }

        .card-header h2 {
            font-weight: 800;
            font-size: 1.42rem;
            display: flex;
            align-items: center;
            gap: 0.65rem;
            letter-spacing: -0.01em;
            color: #ffffff;
            line-height: 1.35;
        }

        
        .top-banner-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 0 18px 0;
        }

        .top-banner {
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
            margin: 0;
            overflow: visible;
        }

        .top-banner-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .top-banner-center img {
            display: block;
            width: 392px;
            max-width: min(92vw, 392px);
            height: auto;
            object-fit: contain;
        }
        
    
    

        .card-body {
            padding: 24px;
            background: var(--surface);
        }

        .select-area {
            display: grid;
            grid-template-columns: minmax(0, 1fr) var(--button-w);
            gap: 12px;
            margin-bottom: 18px;
            align-items: center;
        }

        .select-wrapper {
            position: relative;
            min-width: 0;
        }

        .select-wrapper select,
        select,
        .input-group input {
            width: 100%;
            height: var(--control-h);
            padding: 0 15px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-md);
            font-size: 1.04rem;
            background: #fff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            font-weight: 500;
            color: var(--text);
            box-shadow: none;
        }

        .select-wrapper select,
        select {
            cursor: pointer;
        }

        .input-group input {
            cursor: text;
        }

        .select-wrapper select:hover,
        select:hover,
        .input-group input:hover {
            border-color: var(--th-purple);
        }

        .select-wrapper select:focus,
        select:focus,
        .input-group input:focus {
            border-color: var(--th-purple);
            box-shadow: 0 0 0 4px var(--th-purple-soft);
        }

        .overview-btn,
        .analyze-btn {
            width: var(--button-w);
            height: var(--control-h);
            border: 1px solid var(--border-strong);
            padding: 0 16px;
            border-radius: var(--radius-md);
            font-weight: 650;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease, color 0.2s ease;
            font-size: 1.02rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        .overview-btn {
            background: var(--surface-soft);
            color: var(--th-purple);
        }

        .overview-btn:hover {
            background: var(--surface-soft-2);
            border-color: var(--th-purple);
        }

        .analyze-btn {
            background: var(--th-purple);
            color: white;
            border-color: var(--th-purple);
            box-shadow: 0 4px 14px rgba(95, 59, 140, 0.16);
        }

        .analyze-btn:hover {
            background: var(--th-purple-hover);
            border-color: var(--th-purple-hover);
            transform: translateY(-1px);
        }

        .analyze-btn:active,
        .overview-btn:active {
            transform: translateY(0);
        }

        .analysis-detail {
            background: var(--surface-soft);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            border: 1px solid #ece5f5;
            margin-top: 4px;
            font-size: 1.03rem;
            color: var(--text-secondary);
            white-space: pre-line;
            max-height: 500px;
            overflow-y: auto;
        }

        .analysis-detail h3 {
            color: var(--th-purple);
            margin-bottom: 10px;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .prof-selector {
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 160px minmax(0, 1fr);
            gap: 12px;
            align-items: center;
            background: transparent;
            padding: 0;
            border: none;
        }

        .prof-selector label {
            height: var(--control-h);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--th-purple);
            background: var(--surface-soft);
            border: 1px solid #e6daf6;
            padding: 0 14px;
            border-radius: var(--radius-md);
            font-size: 1.1rem;
        }

        select {
            min-width: 0;
        }

        .chapters-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .chapter-card {
            background: var(--surface-soft);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            border: 1px solid #ece5f5;
        }

        .chapter-title {
            font-size: 1.16rem;
            font-weight: 800;
            color: var(--th-purple);
            border-left: 4px solid var(--th-purple);
            padding-left: 22px;
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }

        .focus-area {
            background: #ffffff;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            margin: 10px 0;
            line-height: 1.65;
            font-size: 1.03rem;
            white-space: pre-line;
            border: 1px solid #ece5f5;
            color: var(--text-secondary);
        }

        .questions-list {
            list-style-type: none;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .questions-list li {
            background: #fcfbfe;
            border: 1px solid #ece5f5;
            border-radius: 12px;
            padding: 12px 14px;
            line-height: 1.6;
            color: var(--text-secondary);
            font-size: 1.02rem;
        }

        .data-form {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr)) var(--button-w);
            gap: 12px;
            margin-bottom: 18px;
            background: transparent;
            padding: 0;
            border: none;
            align-items: end;
        }

        .input-group {
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.02rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--th-purple);
            min-height: 44px;
            line-height: 1.4;
        }

        .input-group input {
            text-align: center;
        }

        .improve-box {
            background: var(--surface-soft);
            border: 1px solid #ece5f5;
            padding: 18px 20px;
            border-radius: var(--radius-lg);
            margin-top: 8px;
            color: var(--text-secondary);
            font-size: 1.03rem;
        }

        .improve-box h4 {
            color: var(--th-purple);
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .improve-box ul {
            padding-left: 20px;
            margin: 6px 0 14px;
        }

        .improve-box li {
            margin-bottom: 8px;
        }

        .improve-box hr {
            border: none;
            border-top: 1px solid #e6daf6;
            margin: 16px 0 0;
        }

        strong {
            color: var(--th-purple);
        }

        footer {
            text-align: center;
            font-size: 0.86rem;
            color: var(--text-muted);
            margin-top: 2px;
            padding: 4px 0 0;
        }
        
        
        .main-layout {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 28px;
            align-items: start;
        }

        .ai-panel {
    
            position: sticky;
            top: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
            padding: 18px;
            min-height: 760px;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: visible;
        }

        .ai-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee5f7;
        }

        .ai-panel-title {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            font-size: 1.42rem;
            font-weight: 800;
            color: var(--th-purple);
            letter-spacing: -0.01em;
            line-height: 1.35;
        }

        .ai-title-mascot {
            width: 46px;
            height: 46px;
            object-fit: contain;
            flex-shrink: 0;
            display: block;
        }

        .ai-panel-title-text {
            display: inline-block;
        }

        .ai-panel-shell {
            position: relative;
            width: 100%;
            overflow: visible;
        }

        .ai-mascot-side {
            position: absolute;
            left: -102px;
            top: 18px;
            width: 96px;
            height: auto;
            object-fit: contain;
            z-index: 6;
            pointer-events: none;
            filter: drop-shadow(0 10px 20px rgba(95, 59, 140, 0.08));
        }

        .ai-panel-badge {
            padding: 6px 10px;
            border-radius: 999px;
            background: #f3ebfc;
            color: var(--th-purple);
            font-size: 0.88rem;
            font-weight: 700;
            border: 1px solid #e7d9f7;
        }

        .ai-chat-window {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 4px 2px 16px;
            height: 620px;
            max-height: 620px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        
        .ai-message {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            justify-content: flex-start;
            width: 100%;
        }

        .ai-message.user {
            justify-content: flex-end;
            flex-direction: row-reverse;
        }
    

        .ai-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1rem;
            border: 1px solid #e4d7f5;
            background: #f5eefc;
        }

        .ai-message.user .ai-avatar {
            background: #eef8ef;
            border-color: #d7ecd8;
        }

                .ai-bubble {
            max-width: min(78%, calc(100% - 58px));
            padding: 12px 14px;
            border-radius: 18px;
            font-size: 0.97rem;
            line-height: 1.65;
            border: 1px solid #eadff7;
            background: #ffffff;
            color: var(--text-secondary);
        }

        .ai-message.assistant .ai-bubble {
            background: #fff3f3;
            border-color: #f1d9d9;
        }

        .ai-message.user .ai-bubble {
            background: #f1fbf1;
            border-color: #d9edd9;
        }

        .ai-message.assistant .ai-bubble {
            margin-right: auto;
        }

        .ai-message.user .ai-bubble {
            margin-left: auto;
            text-align: left;
        }


        .ai-message.pinned {
            position: sticky;
            top: 0;
            z-index: 8;
            padding: 2px 0 8px;
            background: linear-gradient(180deg, #ffffff 0%, #ffffff 80%, rgba(255,255,255,0) 100%);
        }

        .ai-message.pinned .ai-bubble {
            font-weight: 600;
            box-shadow: 0 8px 18px rgba(95, 59, 140, 0.06);
        }

        .ai-input-wrap {
            margin-top: auto;
            background: #f7f1fc;
            border: 1px solid #decdf3;
            border-radius: 26px;
            padding: 14px 14px 12px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
        }

        .ai-input-placeholder {
            color: #6f6680;
            font-size: 1.02rem;
            margin-bottom: 10px;
            min-height: 28px;
        }

        .ai-input-toolbar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .ai-icon-btn {
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffffff;
            background: #6d46a4;
            font-size: 1rem;
            box-shadow: 0 6px 16px rgba(95, 59, 140, 0.18);
        }

        .right-content {
            min-width: 0;
            width: 100%;
        }
    


        @media (max-width: 1180px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .ai-panel {
                position: static;
                min-height: 560px;
            }
        }

        @media (max-width: 1100px) {
            .data-form {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .analyze-btn {
                width: 100%;
            }
        }

        @media (max-width: 900px) {
            body {
                padding: 18px 14px 28px;
            }

            .card-body,
            .card-header {
                padding-left: 18px;
                padding-right: 18px;
            }
        }

        @media (max-width: 1080px) {
            .top-banner {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .top-banner-center img {
                width: min(78vw, 260px);
            }
        }

        @media (max-width: 720px) {
            body {
                padding: 14px 12px 24px;
            }

            .container {
                gap: 18px;
            }

            .card {
                border-radius: 18px;
            }

            .card-body,
            .card-header {
                padding: 16px;
            }

            
            .top-banner-wrap {
                margin-bottom: 14px;
            }

            .top-banner {
                padding: 0;
            }

            .top-banner-center img {
                width: min(78vw, 220px);
            }
    

            .select-area,
            .prof-selector,
            .data-form {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .select-wrapper,
            select,
            .input-group,
            .overview-btn,
            .analyze-btn,
            .prof-selector label {
                width: 100%;
                min-width: 100%;
            }

            .prof-selector label {
                justify-content: flex-start;
                padding-left: 14px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cfc4dd;
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #bba9d4;
        }
    

        .ai-panel-live {
            gap: 14px;
            min-height: 820px;
        }

        .ai-panel-heading {
            min-width: 0;
        }

        .ai-panel-subtitle {
            color: var(--text-muted);
            font-size: 0.92rem;
            margin-top: 4px;
            line-height: 1.45;
        }

        .ai-panel-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .ai-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 74px;
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid #e3d7f4;
            background: #faf6ff;
            color: var(--th-purple);
            font-size: 0.85rem;
            font-weight: 700;
        }

        .ai-status-badge.ready {
            background: #f3f8f1;
            border-color: #d7ebd1;
            color: #35613a;
        }

        .ai-status-badge.busy {
            background: #fff5ea;
            border-color: #f3ddbb;
            color: #8d5a07;
        }

        .ai-status-badge.error {
            background: #fff3f3;
            border-color: #f1d9d9;
            color: #b04a4a;
        }

        .ai-config-toggle,
        .ai-primary-btn,
        .ai-secondary-btn,
        .ai-send-btn,
        .ai-chip-remove {
            border: none;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        .ai-config-toggle:hover,
        .ai-primary-btn:hover,
        .ai-secondary-btn:hover,
        .ai-send-btn:hover,
        .ai-chip-remove:hover {
            transform: translateY(-1px);
        }

        .ai-config-toggle {
            height: 38px;
            padding: 0 14px;
            border-radius: 12px;
            background: #f4ecfc;
            color: var(--th-purple);
            font-weight: 700;
            border: 1px solid #e4d6f5;
        }

        .ai-config-panel {
            display: none;
            background: #fbf9fe;
            border: 1px solid #ece2f8;
            border-radius: 18px;
            padding: 14px;
            gap: 12px;
        }

        .ai-config-panel.open {
            display: flex;
            flex-direction: column;
        }

        .ai-config-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .ai-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .ai-field-full {
            grid-column: 1 / -1;
        }

        .ai-field label {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--th-purple);
        }

        .ai-field input,
        .ai-field select,
        .ai-field textarea,
        .ai-textarea {
            width: 100%;
            border: 1px solid #dcccf1;
            border-radius: 14px;
            background: #fff;
            color: var(--text);
            outline: none;
            padding: 12px 14px;
            font-size: 0.96rem;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .ai-field input:focus,
        .ai-field select:focus,
        .ai-field textarea:focus,
        .ai-textarea:focus {
            border-color: var(--th-purple);
            box-shadow: 0 0 0 4px rgba(95, 59, 140, 0.08);
        }

        .ai-field textarea,
        .ai-textarea {
            resize: vertical;
            min-height: 84px;
            line-height: 1.6;
        }

        .ai-config-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .ai-config-tip {
            flex: 1;
            min-width: 220px;
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 1.55;
        }

        .ai-config-btns,
        .ai-toolbar-left,
        .ai-toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .ai-primary-btn,
        .ai-send-btn {
            background: var(--th-purple);
            color: #fff;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(95, 59, 140, 0.16);
        }

        .ai-secondary-btn {
            background: #f6f0fc;
            color: var(--th-purple);
            border: 1px solid #e3d6f3;
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 700;
        }

        .ai-chat-window {
            background: var(--surface-soft);
            border: 1px solid #ece5f5;
            border-radius: 20px;
            padding: 14px 12px 16px;
            min-height: 620px;
        }

        .ai-message.system-error .ai-bubble,
        .ai-message.error .ai-bubble {
            background: #fff2f2;
            border-color: #f0d4d4;
            color: #8e3636;
        }

        .ai-message.loading .ai-bubble {
            background: #faf6ff;
            border-style: dashed;
        }

        .ai-bubble {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .ai-attachment-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 0;
        }

        .ai-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            max-width: 100%;
            border-radius: 999px;
            background: #f7f1fc;
            border: 1px solid #e4d7f4;

<script>
    // ------------------- 专业列表 -------------------
    const allMajors = [
        "口腔医学", "口腔医学技术", "口腔卫生保健", "护理", "康复治疗技术", 
        "婴幼儿托育服务与管理", "体育保健与康复", "智能医疗装备技术", "医疗器械维护与管理", 
        "医疗器械经营与服务", "计算机应用技术", "大数据技术", "健康大数据管理与服务",

    // ------------------- 学情详细文本（用户提供）--------------------
    const overallAnalysis = `总体学情概述
资阳口腔职业学院学生整体呈现行业认同感强、实践导向明确、职业焦虑与期待并存的特点。学院依托“中国牙谷”和华西专家资源，学生入学便具有较强的专业归属感。但作为大专层次学生，普遍关注“学历提升与技能立身”的平衡。在“形势与政策”课程学习中，学生表现出对与专业直接相关的国家政策（如医疗改革、人口政策、数字经济）兴趣浓厚，但对宏观政治理论、国际形势等抽象内容易产生距离感。教学中需精准把握“国家大势”与“个人职业发展”的结合点，引导学生将个人成长融入国家战略。`;

    const professionAnalysisMap = {
        "口腔医学": `口腔医学专业学情分析
该专业学生入学分数较高，对华西专家领衔的教学团队有强烈认同，职业理想集中于成为一名优秀的口腔临床医生。在形势与政策课程中，他们对“健康中国”战略中关于口腔医疗体系建设、公立医院改革、社会办医等政策表现出浓厚兴趣，但容易将国家政策简化为“就业利好”。部分学生因学历层次而对职业发展空间存在焦虑，需要从国家“加强基层医疗卫生服务体系建设”的政策导向出发，引导其理解口腔医学人才在分级诊疗中的重要作用，树立服务基层、扎根社区的职业价值观。教学中可结合《基本医疗卫生与健康促进法》、医保支付方式改革等热点，帮助学生认识规范执业、依法行医的必然性，同时融入医德医风教育，使其将个人成长融入国家卫生事业发展大局。`,
        "口腔医学技术": `口腔医学技术专业学情分析
本专业学生动手能力强，对数字化义齿制作、CAD/CAM技术等有浓厚兴趣，但对理论课程略显疏离。他们关注行业新技术动态，但对国家宏观政策与自身职业的关联缺乏系统认识。在形势与政策教学中，需重点引导学生理解“新质生产力”在口腔产业的具体体现——数字化、智能化正重塑义齿加工行业，国家支持高端医疗器械国产化的政策为技术人才提供了广阔舞台。同时，学生易产生“我是技师而非医生”的职业认知局限，需结合国家“大国工匠”高技能人才支持政策，提升其职业价值感。教学中应剖析医疗器械监管法规（如定制式义齿注册管理）对行业规范的影响，使学生认识到技术操作背后是质量安全责任，培养精益求精的工匠精神和法治意识。`,
        "口腔卫生保健": `口腔卫生保健专业学情分析
该专业学生性格开朗，沟通能力强，对健康宣教、预防保健等课程接受度高，但入学时对自身职业定位模糊，常被误解为“洗牙工”。形势与政策课程需着重解读国家“预防为主”的卫生方针和“全生命周期健康管理”理念，阐明口腔卫生保健人员在提升全民口腔健康水平中的战略价值。结合《健康口腔行动方案（2019-2025年）》及后续政策，让学生看到国家在口腔疾病预防领域的持续投入。学生普遍对社区工作、公共卫生服务有畏难情绪，需要引导其理解“基本公共卫生服务均等化”的政策内涵，树立服务基层的职业志向。教学中还可融入“健康中国”建设中公众健康素养提升的案例，激发学生开展健康科普的社会责任感。`,
        "护理": `护理专业学情分析
护理专业学生以女生为主，学习态度端正，但普遍存在职业认同感不高、对发展前景担忧的问题。在形势与政策课程中，学生对“护士队伍建设”“互联网+护理服务”“老年护理”等政策表现出关注，但往往只看到辛苦的一面，缺乏从国家战略高度理解护理工作的意义。教学中需重点结合“积极应对人口老龄化”国家战略，阐释护理人才是养老服务体系的骨干力量；结合《关于进一步改善护理服务行动计划》，说明国家正在优化护士执业环境、拓展职业路径。同时，引导学生认识护理工作不仅在临床，更在社区、家庭、康养机构中大有可为，从而提升职业自豪感，将个人发展融入国家应对人口老龄化的大局中。`,
        "康复治疗技术": `康复治疗技术专业学情分析
本专业学生动手意愿强，对康复技术有较高兴趣，但往往将康复简单等同于“按摩理疗”，对康复医学在现代医学体系中的地位认识不足。形势与政策课程需系统解读国家“全生命周期健康”理念和“康复医疗工作发展”相关政策，如《关于加快推进康复医疗工作发展的意见》，阐明康复在改善患者功能、减轻社会负担方面的重要作用。结合人口老龄化、慢性病高发的国情，让学生看到康复人才需求的巨大缺口。学生关注就业地域和薪资，但易忽略基层康复服务体系建设中的机遇。教学中应引导学生树立“康复服务下沉”的意识，理解国家推动康复医疗资源均衡配置的政策导向，培养服务基层、回馈社会的职业情怀。`,
        "婴幼儿托育服务与管理": `婴幼儿托育服务与管理专业学情分析
该专业学生富有爱心、喜欢孩子，但普遍存在职业社会地位不高的认知，部分学生和家长对托育工作存在偏见。形势与政策课程应成为提升其职业价值感的关键阵地。教学中需重点解读国家“优化人口发展战略”“建立生育支持政策体系”的决策部署，阐明托育服务是降低生育养育成本、提振生育水平的重要支撑。结合“普惠托育服务专项行动”等具体政策，让学生看到国家在增加托位、规范行业、提升质量方面的巨大投入，明确自身职业是解决民生痛点、服务国家战略的重要力量。同时，引导学生关注托育行业标准化、专业化发展趋势，认识到需要不断学习政策法规、儿童发展知识，才能成为符合国家要求的高素质托育人才。`,
        "体育保健与康复": `体育保健与康复专业学情分析
本专业学生体育特长突出，性格阳光，但文化基础相对薄弱，理论学习兴趣不高。他们关注运动损伤防护，但对“体卫融合”国家战略缺乏认识。形势与政策教学中，需结合《体育强国建设纲要》《“十四五”国民健康规划》等政策，阐释“运动是良医”的理念以及国家推动体育与卫生健康深度融合的导向。引导学生认识到，体育保健与康复人才不仅在运动队、健身机构发挥作用，更在社区健康促进、慢性病运动干预、青少年脊柱健康等领域有广阔空间。教学中可融入全民健身、健康中国建设案例，激发学生将专业技能服务于大众健康，超越单纯的竞技体育服务视野，培养服务“体卫融合”新业态的复合型人才。`,
        "智能医疗装备技术": `智能医疗装备技术专业学情分析
该专业学生逻辑思维强，对医疗设备原理、新技术有较强好奇心，但容易陷入“技术至上”思维，忽略技术发展背后的国家战略与政策环境。形势与政策课程需重点引导学生理解国家“高端医疗器械国产化”战略，结合“十四五”医疗装备产业发展规划，阐明医疗设备自主可控对国家安全、人民健康的重要性。地处“中国牙谷”的区位优势，使学生能近距离接触产业前沿，教学中可结合口腔医疗设备国产化案例，激发学生科技报国的使命感。同时，要融入《医疗器械监督管理条例》等法规教育，使学生认识到医疗设备安全事关生命，树立严谨的质量意识和合规意识。`,
        "医疗器械维护与管理": `医疗器械维护与管理专业学情分析
本专业学生动手与理论并重，对设备维护、质量控制课程兴趣浓厚，但部分学生认为“管理”类课程枯燥。形势与政策教学中，需结合国家加强医疗器械全生命周期监管的政策背景，阐明质量控制、风险管理在保障用械安全中的核心作用。引导学生认识到，医疗器械维护与管理不仅是一项技术工作，更承担着守护公众健康的社会责任。结合“中国牙谷”产业发展，分析地方如何落实国家医疗器械审评审批制度改革，让学生理解政策落地对产业和职业的深远影响。教学中可融入职业伦理与法规教育，培养严谨细致、责任至上的职业素养，为国家医疗器械监管和产业高质量发展输送专业人才。`,
        "医疗器械经营与服务": `医疗器械经营与服务专业学情分析
本专业学生性格外向，沟通能力强，对市场营销、客户服务有浓厚兴趣，但容易将工作目标单纯定位于销售业绩。形势与政策课程需重点强化法规意识与行业伦理。教学中应结合《医疗器械监督管理条例》、流通领域“两票制”等政策，阐明合规经营、反腐倡廉是行业健康发展的底线。引导学生认识医疗器械经营不仅是商业活动，更关乎医疗质量与患者安全，需树立诚信为本、服务至上的理念。结合国家支持“互联网+医疗器械”流通新模式，拓宽学生职业视野。同时，融入医药领域反腐倡廉案例，帮助学生扣好职业生涯的“第一粒扣子”，培养知法守法、德才兼备的医疗器械营销人才。`,
        "计算机应用技术": `计算机应用技术专业学情分析
本专业学生动手能力强，对编程、网络技术有较高兴趣，但易将技术学习与价值观塑造割裂。形势与政策课程需引导学生理解“数字中国”战略对计算机人才的迫切需求，特别是信息技术在医疗健康领域的深度融合。结合《“十四五”全民健康信息化规划》，让学生看到医疗信息化、智慧医院建设中的就业机遇。同时，必须强化网络安全、数据安全法规教育，结合《数据安全法》《个人信息保护法》等，使学生认识到程序员代码背后是国家安全和个人隐私，培养正确的技术伦理观。教学中可融入国产软件自主创新案例，激发学生投身科技自立自强的责任感。`,
        "大数据技术": `大数据技术专业学情分析
本专业学生数学基础较好，对数据分析技术有探索欲，但容易将大数据视为纯粹技术工具，缺乏对国家数据战略的宏观认识。形势与政策教学中，需重点解读国家“数据作为生产要素”的政策理念，以及《“数据要素×”三年行动计划》等部署，阐明大数据在医疗健康、社会治理等领域的战略价值。引导学生认识健康医疗大数据是国家基础性战略资源，其安全治理、规范应用事关国家安全和人民福祉。结合医疗数据泄露、算法歧视等案例，强化数据伦理教育。教学中可引导学生探讨大数据如何赋能“中国牙谷”产业链升级，激发其用技术服务产业发展的热情，培养懂数据、懂医疗、懂国情的复合型人才。`,
        "健康大数据管理与服务": `健康大数据管理与服务专业学情分析
本专业学生关注健康领域，对数据与健康结合有较强学习动机，但医学基础薄弱，对健康数据管理的政策法规了解不多。形势与政策课程需系统解读国家在健康医疗大数据领域的政策布局，如《关于加强全民健康信息标准化体系建设的意见》等，帮助学生明确数据标准、互联互通的重要性。结合国家推动“互联网+医疗健康”、远程医疗等政策，让学生看到健康数据在优化资源配置、提升服务可及性中的关键作用。教学中需强化数据安全、隐私保护意识教育，引导学生理解健康数据管理不仅是一项技术工作，更承担着保障公民健康权益、维护国家安全的社会责任，培养既懂技术又懂政策的复合型人才。`,
        "电子商务": `电子商务专业学情分析

        "医疗设备安装与维护": `医疗设备安装与维护专业学情分析

    function renderTeachingPanel(major) {

    function populateSelect() {

        select.value = allMajors[0];
        renderTeachingPanel(allMajors[0]);
        select.addEventListener("change", (e) => renderTeachingPanel(e.target.value));
    }

    function getLevel(value, type) {
        if (type === 'score') {
            if (value <= 3) return 'low';
            if (value <= 6) return 'medium';
            return 'high';
        }
        if (type === 'percent') {
            if (value <= 60) return 'veryLow';
            if (value <= 70) return 'low';
            if (value <= 80) return 'medium';
            if (value <= 90) return 'high';
            return 'veryHigh';
        }
        return 'medium';
    }
    
    function getAdviceForMetric(metricName, value, level, type) {
        if (type === 'score') {
            if (level === 'low') {
                return `【${metricName}严重不足】当前${metricName}仅${value}分，课堂缺乏基本活力。建议立即启动“破冰行动”：每节课前3分钟播放行业热点短视频或开展趣味提问；实施“匿名观点漂流本”降低发言压力；强制要求每节课至少3次小组讨论并随机抽查分享；设立“课堂氛围观察员”角色由学生轮值，课后反馈改进点。同时可引入轻音乐背景、教学小游戏等元素，逐步重建积极课堂生态。`;
            } else if (level === 'medium') {
                return `【${metricName}中等】当前${metricName}为${value}分，课堂氛围一般，尚未形成稳定参与感。建议增设“时事微辩论”（每两周一次），围绕“数字医疗是否过度依赖技术”“口腔健康是否应纳入基本公卫”等辩题；开展“专业与政策对对碰”，让学生分组展示本专业相关政策；使用学习通发起即时投票/词云互动，增强实时反馈。同时可优化座位布局，鼓励圆桌式讨论。`;
            } else {
                return `【${metricName}良好】当前${metricName}为${value}分，已有较好基础。建议向深度互动进阶：引入“角色互换教学”，选取简单章节让学生分组备课并上台讲解；开展“项目式学习”，设计为期两周的小型调研并路演展示；每节课预留5分钟“高光时刻”分享，让学生推荐与课程相关的专业前沿案例，持续提升课堂张力。`;
            }
        } else {
            if (level === 'veryLow') {
                return `【${metricName}极低】当前${metricName}仅${value}%，大量学生缺交或迟到。需立即改革：推行“菜单式作业”（短视频、思维导图、小论文三选一），降低抵触心理；建立“作业积分银行”，按时完成得基础分，优秀作业额外加分，积分可兑换免写一次作业或小礼品；对连续缺交学生启动“一对一提醒+帮扶”；强化课堂签到与过程性评价挂钩，占比不低于30%。同时可设置“作业加油站”课后辅导时段。`;
            } else if (level === 'low') {
                return `【${metricName}偏低】当前${metricName}为${value}%，完成情况不佳。建议优化作业设计：减少机械抄写，增加实践类任务（如“调研身边的口腔诊所数字化程度”“拍摄非遗文化短视频”）；建立学习小组互相督促，组长每周汇总完成情况；每次作业后利用5分钟简要点评并展示优秀作业，树立榜样。同时可设置“作业进步奖”激励后进学生。`;
            } else if (level === 'medium') {
                return `【${metricName}中等】当前${metricName}为${value}%，仍有提升空间。可引入“作业互评”机制，学生交换批改并写评语，培养责任意识；增设“挑战性附加题”，对完成优秀者给予平时分奖励；利用数字化平台发布作业提醒和参考答案，帮助学生及时纠错。同时可定期组织“作业经验分享会”，让优秀学生传授方法。`;
            } else if (level === 'high') {
                return `【${metricName}较好】当前${metricName}为${value}%，保持稳定。建议增加开放性、探究性任务，如“政策建议书”“行业分析报告”；鼓励学生将作业成果投稿至班级公众号或院系平台，扩大影响力。同时可试点“免作业券”奖励，对连续多次优秀学生给予一次免做机会，激发更高热情。`;
            } else {
                return `【${metricName}优秀】当前${metricName}为${value}%，完成率极高。可在此基础上增设“学术拓展任务”，对接真实行业课题（如“中国牙谷”产业数据分析），培养学生高阶能力。同时组织“优秀作业展”，邀请专业教师、企业导师参与点评，增强学生成就感与专业认同。`;
            }
        }
    }
    
    function analyzeClassroom() {
        let atmosphere = parseFloat(document.getElementById("atmosphere").value);
        let interaction = parseFloat(document.getElementById("interaction").value);
        let homeworkRate = parseFloat(document.getElementById("homeworkRate").value);
        let attendance = parseFloat(document.getElementById("attendance").value);
        if (isNaN(atmosphere)) atmosphere = 5;
        if (isNaN(interaction)) interaction = 5;
        if (isNaN(homeworkRate)) homeworkRate = 75;
        if (isNaN(attendance)) attendance = 85;
        
        const atmLevel = getLevel(atmosphere, 'score');
        const intLevel = getLevel(interaction, 'score');
        const hwLevel = getLevel(homeworkRate, 'percent');
        const attLevel = getLevel(attendance, 'percent');
        
        let suggestions = "";
        suggestions += getAdviceForMetric("课堂氛围", atmosphere, atmLevel, 'score') + "\n\n";
        suggestions += getAdviceForMetric("课堂互动程度", interaction, intLevel, 'score') + "\n\n";
        suggestions += getAdviceForMetric("课堂作业完成率", homeworkRate, hwLevel, 'percent') + "\n\n";
        suggestions += getAdviceForMetric("课堂出勤率", attendance, attLevel, 'percent') + "\n\n";
        
        suggestions += `【系统性整合与特色资源利用】\n`;
        suggestions += `• 充分利用学院“中国牙谷”区位优势，开发“口腔健康与现代化”“医疗器械国产化”等校本案例库，使思政课内容与专业认知深度融合。\n`;
        suggestions += `• 依托华西专家资源，邀请临床医生、企业技术骨干进课堂开展“实战对话”，用真实职业场景解答学生困惑。\n`;
        suggestions += `• 建立“班级学习共同体”，每个学生加入学习小组，形成互助互促机制。\n`;
        suggestions += `• 利用数字化工具（学习通/雨课堂）实现签到、互动、作业全流程数据化，定期向学生反馈个人学习画像，激发自我提升动力。\n`;
        suggestions += `• 建议在每次课程结束后对课堂数据进行简要复盘，对比改进前后变化，持续优化教学策略。`;
        
        const weaknesses = [];
        if (atmosphere <= 6) weaknesses.push(`课堂氛围得分${atmosphere}/10，整体偏沉闷`);
        else weaknesses.push(`课堂氛围得分${atmosphere}/10，表现尚可，仍有提升空间`);
        if (interaction <= 6) weaknesses.push(`互动程度得分${interaction}/10，学生参与积极性不足`);
        else weaknesses.push(`互动程度得分${interaction}/10，有一定互动基础`);
        if (homeworkRate <= 80) weaknesses.push(`作业完成率${homeworkRate}%，课后巩固薄弱`);
        else weaknesses.push(`作业完成率${homeworkRate}%，保持良好`);
        if (attendance <= 90) weaknesses.push(`出勤率${attendance}%，存在缺勤或迟到`);
        else weaknesses.push(`出勤率${attendance}%，出勤稳定`);
        
        const resultHtml = `
            <h4>📉 课堂不足诊断</h4>
            <ul><li>${weaknesses.join("</li><li>")}</li></ul>
            <h4>✨ 改进策略</h4>
            <div style="white-space: pre-line; line-height: 1.6;">${suggestions}</div>
            <hr><p style="font-size:0.85rem; margin-top:0.5rem;">⭐ 以上策略基于课堂数据分层生成，建议结合班级实际情况分步实施，持续跟踪效果并动态调整。</p>
        `;
        document.getElementById("improvementResult").innerHTML = resultHtml;
    }

        systemPrompt: "你是“形势与政策课程 · 智慧助教系统”中的小白牙智慧助教。请始终使用中文回答，优先服务职业院校教师场景，回答应尽量结合思政教学、学情分析、课堂设计、课堂诊断、专业融合和课程问答，表达清楚、可直接用于教学。"
    };

    const AI_STORAGE_KEY = "smartTeachingAssistant_AI_Config_v1";
    const AI_CHAT_STORAGE_KEY = "smartTeachingAssistant_AI_Chat_v1";

    let aiState = {
        config: { ...AI_DEFAULT_CONFIG },
        attachments: [],
        conversation: [],
        waiting: false
    };


    function syncAssistantPanelMetrics() {
        const shell = document.getElementById("assistantPanelShell");
        const rightContent = document.querySelector(".right-content");
        if (!shell || !rightContent) return;

        const body = document.body;
        const wasOpen = body.classList.contains("assistant-open");
        body.classList.remove("assistant-open");
        body.classList.add("assistant-closed");
        body.classList.remove("assistant-measuring-open");

        const closedRect = rightContent.getBoundingClientRect();
        body.classList.add("assistant-measuring-open");
        const openRect = rightContent.getBoundingClientRect();
        body.classList.remove("assistant-measuring-open");

        const rootStyles = getComputedStyle(document.documentElement);
        const shellStyles = getComputedStyle(shell);
        const gap = parseFloat(rootStyles.getPropertyValue("--assistant-gap")) || 30;
        const targetLeft = (parseFloat(shellStyles.left) || 0) + shell.offsetWidth + gap;
        const shift = Math.max(0, targetLeft - openRect.left);

        const fixedTop = 148;
        const bottomPadding = 24;
        const availableHeight = Math.max(480, Math.round(window.innerHeight - fixedTop - bottomPadding));

        document.documentElement.style.setProperty("--assistant-open-shift", `${shift}px`);
        document.documentElement.style.setProperty("--assistant-panel-height", `${availableHeight}px`);
        shell.style.top = `${fixedTop}px`;

        if (wasOpen) {
            body.classList.add("assistant-open");
            body.classList.remove("assistant-closed");
        }
    }

    let assistantClosingTimer = null;

    function setAssistantPanelOpen(open) {
        syncAssistantPanelMetrics();
        const body = document.body;
        const trigger = document.getElementById("assistantTrigger");

        if (assistantClosingTimer) {
            clearTimeout(assistantClosingTimer);
            assistantClosingTimer = null;
        }

        if (open) {
            body.classList.remove("assistant-closing");
            body.classList.add("assistant-open");
            body.classList.remove("assistant-closed");
            if (trigger) trigger.setAttribute("aria-expanded", "true");
            setTimeout(() => {
                document.getElementById("aiUserInput")?.focus();
            }, 240);
            return;
        }

        body.classList.remove("assistant-open");
        body.classList.add("assistant-closing");
        body.classList.remove("assistant-closed");
        if (trigger) trigger.setAttribute("aria-expanded", "false");

        assistantClosingTimer = setTimeout(() => {
            body.classList.remove("assistant-closing");
            body.classList.add("assistant-closed");
            assistantClosingTimer = null;
        }, 1120);
    }

    function toggleAssistantPanel() {
        const isOpen = document.body.classList.contains("assistant-open");
        setAssistantPanelOpen(!isOpen);
    }

    function initAIChat() {
        const chatWindow = document.getElementById("aiChatWindow");
        if (!chatWindow) return;

        bindAIEvents();
        loadAIConfig();
        resetAIConversationOnOpen();
        updateAIStatus();
        renderAttachments();
        updateCharCount();
        setAssistantPanelOpen(false);
        syncAssistantPanelMetrics();
        window.addEventListener("resize", syncAssistantPanelMetrics);

        if (window.pdfjsLib) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        }

    }

    function bindAIEvents() {
        const sendBtn = document.getElementById("aiSendBtn");
        const clearBtn = document.getElementById("aiClearBtn");
        const attachBtn = document.getElementById("aiAttachBtn");
        const fileInput = document.getElementById("aiFileInput");
        const textArea = document.getElementById("aiUserInput");
        const dropZone = document.getElementById("aiDropZone");
        const trigger = document.getElementById("assistantTrigger");

        sendBtn?.addEventListener("click", sendAIMessage);
        clearBtn?.addEventListener("click", clearAIConversation);
        trigger?.addEventListener("click", toggleAssistantPanel);
        trigger?.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                toggleAssistantPanel();
            }
        });
        attachBtn?.addEventListener("click", () => fileInput?.click());
        fileInput?.addEventListener("change", async (event) => {
            const files = Array.from(event.target.files || []);
            if (files.length) await handleFiles(files);
            fileInput.value = "";
        });
        textArea?.addEventListener("input", updateCharCount);
        textArea?.addEventListener("keydown", async (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                await sendAIMessage();
            }
        });

        ["dragenter", "dragover"].forEach(eventName => {
            dropZone?.addEventListener(eventName, (event) => {
                event.preventDefault();
                event.stopPropagation();
                dropZone.classList.add("dragover");
            });
        });

        ["dragleave", "dragend", "drop"].forEach(eventName => {
            dropZone?.addEventListener(eventName, (event) => {
                event.preventDefault();
                event.stopPropagation();
                dropZone.classList.remove("dragover");
            });
        });

        dropZone?.addEventListener("drop", async (event) => {
            const files = Array.from(event.dataTransfer?.files || []);
            if (files.length) await handleFiles(files);
        });

        dropZone?.addEventListener("click", () => fileInput?.click());
    }

    function toggleConfigPanel(open) {
        return;
    }

    function handleProviderChange() {
        return;
    }

    function fillPresetConfig() {
        return;
    }

    function loadAIConfig() {
        try {
            const raw = localStorage.getItem(AI_STORAGE_KEY);
            if (!raw) {
                aiState.config = { ...AI_DEFAULT_CONFIG };
                return;
            }
            const parsed = JSON.parse(raw);
            aiState.config = {
                ...AI_DEFAULT_CONFIG,
                apiKey: HARDCODED_IFLOW_API_KEY || parsed.apiKey || "",
                systemPrompt: parsed.systemPrompt || AI_DEFAULT_CONFIG.systemPrompt
            };
        } catch (error) {
            aiState.config = { ...AI_DEFAULT_CONFIG };
        }
    }

    function applyConfigToForm() {
        return;
    }

    function saveAIConfig() {
        return;
    }

    function updateAIStatus(type = "") {
        return;
    }

    function updateCharCount() {
        const text = document.getElementById("aiUserInput")?.value || "";
        const counter = document.getElementById("aiCharCount");
        if (counter) counter.textContent = String(text.length);
    }

    function appendMessageToChat(role, content, options = {}) {
        const chatWindow = document.getElementById("aiChatWindow");
        const message = document.createElement("div");
        message.className = `ai-message ${role}`;
        if (options.className) message.classList.add(options.className);

        const avatar = document.createElement("div");
        avatar.className = "ai-avatar";
        avatar.textContent = role === "user" ? "👩‍🏫" : (role === "error" ? "⚠️" : "🤖");

        const bubble = document.createElement("div");
        bubble.className = "ai-bubble";
        bubble.textContent = content;

        message.appendChild(avatar);
        message.appendChild(bubble);
        chatWindow.appendChild(message);
        chatWindow.scrollTop = chatWindow.scrollHeight;

        if (options.persist) {
            aiState.conversation.push({ role, content, apiContent: options.apiContent || content });
            persistAIConversation();
        }
        return message;
    }

    function persistAIConversation() {
        return;
    }

    function resetAIConversationOnOpen() {
        aiState.conversation = [];
        try {
            localStorage.removeItem(AI_CHAT_STORAGE_KEY);
        } catch (error) {}
        const chatWindow = document.getElementById("aiChatWindow");
        if (chatWindow) {
            chatWindow.innerHTML = "";
        }
    }

    function clearAIConversation() {
        if (!confirm("确定清空当前 AI 对话记录吗？")) return;
        aiState.conversation = [];
        try {
            localStorage.removeItem(AI_CHAT_STORAGE_KEY);
        } catch (error) {}
        const chatWindow = document.getElementById("aiChatWindow");
        if (chatWindow) chatWindow.innerHTML = "";
        aiState.attachments = [];
        renderAttachments();
    }

    function renderAttachments() {
        const strip = document.getElementById("attachmentStrip");
        strip.innerHTML = "";
        aiState.attachments.forEach(item => {
            const chip = document.createElement("div");
            chip.className = "ai-chip";
            chip.innerHTML = `
                <span class="ai-chip-name">${escapeHtml(item.name)}</span>
                <span class="ai-chip-meta">${escapeHtml(item.statusText)}</span>
            `;
            const removeBtn = document.createElement("button");
            removeBtn.className = "ai-chip-remove";
            removeBtn.type = "button";
            removeBtn.textContent = "×";
            removeBtn.addEventListener("click", () => {
                aiState.attachments = aiState.attachments.filter(file => file.id !== item.id);
                renderAttachments();
            });
            chip.appendChild(removeBtn);
            strip.appendChild(chip);
        });
    }

    async function handleFiles(files) {
        for (const file of files) {
            const item = {
                id: `${Date.now()}_${Math.random().toString(16).slice(2)}`,
                name: file.name,
                type: file.type || "unknown",
                size: file.size,
                text: "",
                status: "loading",
                statusText: "解析中..."
            };
            aiState.attachments.push(item);
            renderAttachments();
            try {
                item.text = await extractFileText(file);
                item.status = "ready";
                item.statusText = item.text ? `已解析 ${Math.min(item.text.length, 12000)} 字` : "仅附带文件信息";
            } catch (error) {
                item.status = "error";
                item.text = `文件名：${file.name}\n文件类型：${file.type || 'unknown'}\n文件大小：${formatFileSize(file.size)}\n说明：当前页面未能自动解析该文件内容。`;
                item.statusText = "解析失败，已保留文件信息";
            }
            renderAttachments();
        }
    }

    async function extractFileText(file) {
        const name = file.name.toLowerCase();
        const ext = name.includes(".") ? name.split(".").pop() : "";
        let text = "";

        if (["txt", "md", "markdown", "csv", "tsv", "json", "html", "htm", "xml", "js", "ts", "py", "java", "cpp", "c", "sql", "yml", "yaml"].includes(ext) || file.type.startsWith("text/")) {
            text = await file.text();
        } else if (ext === "pdf") {
            text = await extractPdfText(file);
        } else if (ext === "docx") {
            text = await extractDocxText(file);
        } else if (["xlsx", "xls"].includes(ext)) {
            text = await extractExcelText(file);
        } else {
            text = `文件名：${file.name}\n文件类型：${file.type || 'unknown'}\n文件大小：${formatFileSize(file.size)}\n说明：当前页面暂不直接解析此类型文件正文，将只把文件信息附加到问题中。`;
        }

        const normalized = (text || "").replace(/\u0000/g, "").trim();
        if (!normalized) {
            return `文件名：${file.name}\n文件类型：${file.type || 'unknown'}\n文件大小：${formatFileSize(file.size)}\n说明：文件已读取，但未提取到可用文本。`;
        }
        return normalized.length > 12000 ? `${normalized.slice(0, 12000)}\n\n...[文件内容过长，已截断]` : normalized;
    }

    async function extractPdfText(file) {
        if (!window.pdfjsLib) throw new Error("PDF parser unavailable");
        const buffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
        let text = "";
        const pageCount = Math.min(pdf.numPages, 10);
        for (let i = 1; i <= pageCount; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const line = content.items.map(item => item.str).join(" ");
            text += line + "\n";
            if (text.length > 14000) break;
        }
        return text;
    }

    async function extractDocxText(file) {
        if (!window.mammoth) throw new Error("DOCX parser unavailable");
        const buffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: buffer });
        return result.value || "";
    }

    async function extractExcelText(file) {
        if (!window.XLSX) throw new Error("Excel parser unavailable");
        const buffer = await file.arrayBuffer();
        const workbook = XLSX.read(buffer, { type: "array" });
        let text = "";
        workbook.SheetNames.slice(0, 3).forEach(name => {
            const sheet = workbook.Sheets[name];
            const csv = XLSX.utils.sheet_to_csv(sheet);
            text += `【工作表：${name}】\n${csv}\n\n`;
        });
        return text;
    }

    function buildTeachingContext() {
        const major = document.getElementById("professionSelect")?.value || "未选择";
        const atmosphere = document.getElementById("atmosphere")?.value || "未填写";
        const interaction = document.getElementById("interaction")?.value || "未填写";
        const homeworkRate = document.getElementById("homeworkRate")?.value || "未填写";
        const attendance = document.getElementById("attendance")?.value || "未填写";
        return [
            `当前页面专业选择：${major}`,
            `课堂氛围：${atmosphere}`,
            `课堂互动程度：${interaction}`,
            `作业完成率：${homeworkRate}`,
            `课堂出勤率：${attendance}`,
            "页面模块：学生学情分析、专业定制教学方案、思政课堂诊断与改进建议。"
        ].join("\n");
    }

    function buildMessagesForRequest() {
        const systemPrompt = `${aiState.config.systemPrompt}\n\n【当前页面上下文】\n${buildTeachingContext()}`;
        const messages = [
            { role: "system", content: systemPrompt }
        ];
        aiState.conversation.forEach(item => {
            if (item.role === "user" || item.role === "assistant") {
                messages.push({ role: item.role, content: item.apiContent || item.content });
            }
        });
        return messages;
    }

    function buildAttachmentPayload() {
        if (!aiState.attachments.length) return "";
        const parts = aiState.attachments.map((item, index) => {
            return `【附件${index + 1}】\n文件名：${item.name}\n文件类型：${item.type || 'unknown'}\n文件内容：\n${item.text}`;
        });
        return `\n\n请结合以下附件内容一起回答：\n${parts.join("\n\n")}`;
    }

    async function sendAIMessage() {
        if (aiState.waiting) return;
        const input = document.getElementById("aiUserInput");
        const rawText = input.value.trim();
        const attachmentInfo = aiState.attachments.length
            ? `\n\n[已附加 ${aiState.attachments.length} 个文件：${aiState.attachments.map(item => item.name).join('，')}]`
            : "";
        if (!rawText && !aiState.attachments.length) return;

        if (!aiState.config.apiKey || !aiState.config.baseUrl || !aiState.config.model) {
            updateAIStatus("error");
            appendMessageToChat("assistant", "当前页面未检测到可用的 API 配置，请检查脚本中的 HARDCODED_IFLOW_API_KEY、模型名和接口地址。", { persist: false, className: "error" });
            return;
        }

        const displayText = rawText || "请结合我刚上传的文件进行分析。";
        const requestText = `${displayText}${buildAttachmentPayload()}`;
        appendMessageToChat("user", `${displayText}${attachmentInfo}`, { persist: true, apiContent: requestText });

        input.value = "";
        updateCharCount();
        aiState.waiting = true;
        updateAIStatus("busy");
        const loadingNode = appendMessageToChat("assistant", "正在生成回答，请稍候…", { persist: false, className: "loading" });

        try {
            const messages = buildMessagesForRequest();
            const reply = await requestAI(messages);
            loadingNode.remove();
            appendMessageToChat("assistant", reply, { persist: true });
            aiState.attachments = [];
            renderAttachments();
            updateAIStatus();
        } catch (error) {
            loadingNode.remove();
            updateAIStatus("error");
            appendMessageToChat("assistant", `请求失败：${error.message}\n\n如果你使用的是浏览器直连方式，常见原因是 API Key、模型名称、接口地址填写错误，或者浏览器被跨域策略拦截。此时可直接把 API 地址改为你自己的代理接口地址。`, { persist: false, className: "error" });
        } finally {
            aiState.waiting = false;
        }
    }

    async function requestAI(messages) {
        const response = await fetch(aiState.config.baseUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${aiState.config.apiKey}`
            },
            body: JSON.stringify({
                model: aiState.config.model,
                messages,
                stream: false,
                temperature: 0.7,
                max_tokens: 2048
            })
        });

        let data = null;
        try {
            data = await response.json();
        } catch (error) {
            throw new Error(`接口未返回有效 JSON（HTTP ${response.status}）`);
        }

        if (!response.ok) {
            const detail = data?.error?.message || data?.message || JSON.stringify(data);
            throw new Error(detail || `HTTP ${response.status}`);
        }

        const message = data?.choices?.[0]?.message;
        const content = normalizeAIContent(message?.content);
        if (!content) throw new Error("接口返回成功，但没有拿到回答内容。请检查模型是否支持当前请求格式。");
        return content;
    }

    function normalizeAIContent(content) {
        if (typeof content === "string") return content.trim();
        if (Array.isArray(content)) {
            return content.map(item => {
                if (typeof item === "string") return item;
                if (item?.text) return item.text;
                if (item?.content) return item.content;
                return "";
            }).join("\n").trim();
        }
        return "";
    }

    function formatFileSize(size) {
        if (size < 1024) return `${size} B`;
        if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
        return `${(size / (1024 * 1024)).toFixed(1)} MB`;
    }

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }


    function init() {
        populateSelect();
        document.getElementById("analyzeBtn").addEventListener("click", analyzeClassroom);
        analyzeClassroom();
    }
    init();
    initAIChat();
</script>
