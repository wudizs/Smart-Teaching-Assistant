<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>形势与政策课程 · 智慧助教系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #fef9f0 0%, #fff4e6 100%);
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans CJK SC', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            color: #2c2e3a;
        }
        .container { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
        .card {
            background: rgba(255, 255, 248, 0.96);
            border-radius: 2rem;
            box-shadow: 0 25px 40px -18px rgba(0,0,0,0.2), 0 1px 3px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid rgba(180,130,70,0.2);
        }
        .card-header {
            background: linear-gradient(105deg, #8B3C1C 0%, #B85C2A 100%);
            padding: 1.1rem 2rem;
            color: white;
        }
        .card-header h2 { font-weight: 700; font-size: 1.55rem; display: flex; align-items: center; gap: 0.6rem; }
        .card-body { padding: 1.8rem 2rem; }
        
        /* 学情下拉选择板块 */
        .select-area {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .select-wrapper {
            flex: 3;
            position: relative;
        }
        .select-wrapper select {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 1px solid #e2cfb3;
            border-radius: 2.5rem;
            font-size: 1rem;
            background: white;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            color: #2c2e3a;
        }
        .select-wrapper select:focus {
            border-color: #b85c2a;
            box-shadow: 0 0 0 3px rgba(184,92,42,0.2);
        }
        .overview-btn {
            background: #e7d9cd;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2.5rem;
            font-weight: 600;
            color: #7b3f1a;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .overview-btn:hover {
            background: #d4c0ae;
        }
        .analysis-detail {
            background: #fffcf7;
            border-radius: 1.2rem;
            padding: 1.2rem 1.5rem;
            border-left: 6px solid #c26a2e;
            margin-top: 0.5rem;
            line-height: 1.6;
            font-size: 0.95rem;
            color: #2e3b2c;
            white-space: pre-line;
            max-height: 500px;
            overflow-y: auto;
        }
        .analysis-detail h3 {
            color: #9b4a1c;
            margin-bottom: 0.8rem;
            font-size: 1.2rem;
        }
        
        /* 板块2：固定专题陈列 */
        .prof-selector {
            margin-bottom: 1.8rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            background: #fef7ef;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
        }
        .prof-selector label { font-weight: 700; background: #e7d9cd; padding: 0.3rem 1rem; border-radius: 2rem; font-size: 0.9rem; }
        select { flex: 2; padding: 0.65rem 1rem; border-radius: 2rem; border: 1px solid #d9c7b5; background: white; font-weight: 500; cursor: pointer; outline: none; }
        .chapters-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .chapter-card {
            background: #fffefb;
            border-radius: 1.3rem;
            padding: 1.2rem 1.6rem;
            border: 1px solid #eedfcb;
        }
        .chapter-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: #9b4a1c;
            border-left: 4px solid #d98c4a;
            padding-left: 0.8rem;
            margin-bottom: 0.9rem;
        }
        .focus-area {
            background: #faf2e8;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            margin: 0.7rem 0;
            line-height: 1.55;
            font-size: 0.95rem;
            white-space: pre-line;
        }
        .questions-list {
            list-style-type: none;
            margin-top: 0.8rem;
        }
        .questions-list li {
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23b85c2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>') left center no-repeat;
            background-size: 16px;
            padding-left: 1.8rem;
            margin-bottom: 0.7rem;
            line-height: 1.4;
            color: #2e3b2c;
        }
        
        /* 板块3 */
        .data-form {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
            background: #fefaf5;
            padding: 1rem 1.5rem;
            border-radius: 1.5rem;
        }
        .input-group { flex: 1; min-width: 120px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.3rem; color: #8b5a2e; }
        .input-group input { width: 100%; padding: 0.6rem; border-radius: 1.2rem; border: 1px solid #e2cfb3; background: white; text-align: center; }
        .analyze-btn {
            background: #b85c2a;
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            align-self: flex-end;
            height: 46px;
            font-size: 0.95rem;
        }
        .analyze-btn:hover { background: #8e401c; transform: scale(0.97); }
        .improve-box { background: #fef2e4; border-left: 6px solid #e67e22; padding: 1rem 1.6rem; border-radius: 1.2rem; margin-top: 0.8rem; }
        .improve-box h4 { color: #b6491c; margin-bottom: 0.6rem; }
        footer { text-align: center; font-size: 0.75rem; color: #a2856c; margin-top: 0.5rem; }
        @media (max-width: 720px) { body { padding: 1rem; } .card-body { padding: 1.2rem; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #e7d9cd; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c97e48; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <!-- 板块1：学情分析 - 下拉菜单选择专业 -->
    <div class="card">
        <div class="card-header"><h2>📖 学生学情分析 · 专业深度洞察</h2></div>
        <div class="card-body">
            <div class="select-area">
                <div class="select-wrapper">
                    <select id="professionSelect"></select>
                </div>
                <button class="overview-btn" id="showOverviewBtn">📌 总体学情概述</button>
            </div>
            <div id="analysisDetailContainer" class="analysis-detail">
                <h3>✨ 学情分析</h3>
                <p>请从下拉菜单中选择专业或点击“总体学情概述”查看详细分析。</p>
            </div>
        </div>
    </div>

    <!-- 板块2：固定专题（专题一、专题三、专题四）专业定制教学方案 -->
    <div class="card">
        <div class="card-header"><h2>🎯 形势与政策 · 专业定制教学方案</h2></div>
        <div class="card-body">
            <div class="prof-selector">
                <label>🧑‍🎓 选择专业：</label>
                <select id="majorSelect"></select>
            </div>
            <div id="chapterDetailsPanel">
                <div class="chapters-container">请选择专业查看针对性教学方案</div>
            </div>
        </div>
    </div>

    <!-- 板块3：课堂分析改进 -->
    <div class="card">
        <div class="card-header"><h2>📈 思政课堂诊断 · 数智改进建议</h2></div>
        <div class="card-body">
            <div class="data-form">
                <div class="input-group"><label>📝 课堂氛围(1-10)</label><input type="number" id="atmosphere" value="7" step="1" min="1" max="10"></div>
                <div class="input-group"><label>💬 课堂互动程度(1-10)</label><input type="number" id="interaction" value="6.5" step="0.5" min="1" max="10"></div>
                <div class="input-group"><label>📂 课堂作业完成率(%)</label><input type="number" id="homeworkRate" value="82" step="1" min="0" max="100"></div>
                <div class="input-group"><label>👥 课堂出勤率(%)</label><input type="number" id="attendance" value="88" step="1" min="0" max="100"></div>
                <button class="analyze-btn" id="analyzeBtn">✨ 分析改进方向</button>
            </div>
            <div id="improvementResult" class="improve-box"><h4>📌 待诊断</h4><p>输入班级数据，点击分析，获得针对性教学优化策略。</p></div>
        </div>
    </div>
    <footer>形势与政策课程· 智慧助教系统 | 基于专业深度融合理念定制教学方案</footer>
</div>

<script>
    // ------------------- 专业列表 -------------------
    const allMajors = [
        "口腔医学", "口腔医学技术", "口腔卫生保健", "护理", "康复治疗技术", 
        "婴幼儿托育服务与管理", "体育保健与康复", "智能医疗装备技术", "医疗器械维护与管理", 
        "医疗器械经营与服务", "计算机应用技术", "大数据技术", "健康大数据管理与服务", 
        "电子商务", "医疗设备安装与维护", "口腔修复工艺"
    ];

    // ------------------- 学情详细文本（用户提供）--------------------
    const overallAnalysis = `总体学情概述
资阳口腔职业学院学生整体呈现行业认同感强、实践导向明确、职业焦虑与期待并存的特点。学院依托“中国牙谷”和华西专家资源，学生入学便具有较强的专业归属感。但作为大专层次学生，普遍关注“学历提升与技能立身”的平衡。在“形势与政策”课程学习中，学生表现出对与专业直接相关的国家政策（如医疗改革、人口政策、数字经济）兴趣浓厚，但对宏观政治理论、国际形势等抽象内容易产生距离感。教学中需精准把握“国家大势”与“个人职业发展”的结合点，引导学生将个人成长融入国家战略。`;

    const professionAnalysisMap = {
        "口腔医学": `口腔医学专业学情分析
该专业学生入学分数较高，对华西专家领衔的教学团队有强烈认同，职业理想集中于成为一名优秀的口腔临床医生。在形势与政策课程中，他们对“健康中国”战略中关于口腔医疗体系建设、公立医院改革、社会办医等政策表现出浓厚兴趣，但容易将国家政策简化为“就业利好”。部分学生因学历层次而对职业发展空间存在焦虑，需要从国家“加强基层医疗卫生服务体系建设”的政策导向出发，引导其理解口腔医学人才在分级诊疗中的重要作用，树立服务基层、扎根社区的职业价值观。教学中可结合《基本医疗卫生与健康促进法》、医保支付方式改革等热点，帮助学生认识规范执业、依法行医的必然性，同时融入医德医风教育，使其将个人成长融入国家卫生事业发展大局。`,
        "口腔医学技术": `口腔医学技术专业学情分析
本专业学生动手能力强，对数字化义齿制作、CAD/CAM技术等有浓厚兴趣，但对理论课程略显疏离。他们关注行业新技术动态，但对国家宏观政策与自身职业的关联缺乏系统认识。在形势与政策教学中，需重点引导学生理解“新质生产力”在口腔产业的具体体现——数字化、智能化正重塑义齿加工行业，国家支持高端医疗器械国产化的政策为技术人才提供了广阔舞台。同时，学生易产生“我是技师而非医生”的职业认知局限，需结合国家“大国工匠”高技能人才支持政策，提升其职业价值感。教学中应剖析医疗器械监管法规（如定制式义齿注册管理）对行业规范的影响，使学生认识到技术操作背后是质量安全责任，培养精益求精的工匠精神和法治意识。`,
        "口腔卫生保健": `口腔卫生保健专业学情分析
该专业学生性格开朗，沟通能力强，对健康宣教、预防保健等课程接受度高，但入学时对自身职业定位模糊，常被误解为“洗牙工”。形势与政策课程需着重解读国家“预防为主”的卫生方针和“全生命周期健康管理”理念，阐明口腔卫生保健人员在提升全民口腔健康水平中的战略价值。结合《健康口腔行动方案（2019-2025年）》及后续政策，让学生看到国家在口腔疾病预防领域的持续投入。学生普遍对社区工作、公共卫生服务有畏难情绪，需要引导其理解“基本公共卫生服务均等化”的政策内涵，树立服务基层的职业志向。教学中还可融入“健康中国”建设中公众健康素养提升的案例，激发学生开展健康科普的社会责任感。`,
        "护理": `护理专业学情分析
护理专业学生以女生为主，学习态度端正，但普遍存在职业认同感不高、对发展前景担忧的问题。在形势与政策课程中，学生对“护士队伍建设”“互联网+护理服务”“老年护理”等政策表现出关注，但往往只看到辛苦的一面，缺乏从国家战略高度理解护理工作的意义。教学中需重点结合“积极应对人口老龄化”国家战略，阐释护理人才是养老服务体系的骨干力量；结合《关于进一步改善护理服务行动计划》，说明国家正在优化护士执业环境、拓展职业路径。同时，引导学生认识护理工作不仅在临床，更在社区、家庭、康养机构中大有可为，从而提升职业自豪感，将个人发展融入国家应对人口老龄化的大局中。`,
        "康复治疗技术": `康复治疗技术专业学情分析
本专业学生动手意愿强，对康复技术有较高兴趣，但往往将康复简单等同于“按摩理疗”，对康复医学在现代医学体系中的地位认识不足。形势与政策课程需系统解读国家“全生命周期健康”理念和“康复医疗工作发展”相关政策，如《关于加快推进康复医疗工作发展的意见》，阐明康复在改善患者功能、减轻社会负担方面的重要作用。结合人口老龄化、慢性病高发的国情，让学生看到康复人才需求的巨大缺口。学生关注就业地域和薪资，但易忽略基层康复服务体系建设中的机遇。教学中应引导学生树立“康复服务下沉”的意识，理解国家推动康复医疗资源均衡配置的政策导向，培养服务基层、回馈社会的职业情怀。`,
        "婴幼儿托育服务与管理": `婴幼儿托育服务与管理专业学情分析
该专业学生富有爱心、喜欢孩子，但普遍存在职业社会地位不高的认知，部分学生和家长对托育工作存在偏见。形势与政策课程应成为提升其职业价值感的关键阵地。教学中需重点解读国家“优化人口发展战略”“建立生育支持政策体系”的决策部署，阐明托育服务是降低生育养育成本、提振生育水平的重要支撑。结合“普惠托育服务专项行动”等具体政策，让学生看到国家在增加托位、规范行业、提升质量方面的巨大投入，明确自身职业是解决民生痛点、服务国家战略的重要力量。同时，引导学生关注托育行业标准化、专业化发展趋势，认识到需要不断学习政策法规、儿童发展知识，才能成为符合国家要求的高素质托育人才。`,
        "体育保健与康复": `体育保健与康复专业学情分析
本专业学生体育特长突出，性格阳光，但文化基础相对薄弱，理论学习兴趣不高。他们关注运动损伤防护，但对“体卫融合”国家战略缺乏认识。形势与政策教学中，需结合《体育强国建设纲要》《“十四五”国民健康规划》等政策，阐释“运动是良医”的理念以及国家推动体育与卫生健康深度融合的导向。引导学生认识到，体育保健与康复人才不仅在运动队、健身机构发挥作用，更在社区健康促进、慢性病运动干预、青少年脊柱健康等领域有广阔空间。教学中可融入全民健身、健康中国建设案例，激发学生将专业技能服务于大众健康，超越单纯的竞技体育服务视野，培养服务“体卫融合”新业态的复合型人才。`,
        "智能医疗装备技术": `智能医疗装备技术专业学情分析
该专业学生逻辑思维强，对医疗设备原理、新技术有较强好奇心，但容易陷入“技术至上”思维，忽略技术发展背后的国家战略与政策环境。形势与政策课程需重点引导学生理解国家“高端医疗器械国产化”战略，结合“十四五”医疗装备产业发展规划，阐明医疗设备自主可控对国家安全、人民健康的重要性。地处“中国牙谷”的区位优势，使学生能近距离接触产业前沿，教学中可结合口腔医疗设备国产化案例，激发学生科技报国的使命感。同时，要融入《医疗器械监督管理条例》等法规教育，使学生认识到医疗设备安全事关生命，树立严谨的质量意识和合规意识。`,
        "医疗器械维护与管理": `医疗器械维护与管理专业学情分析
本专业学生动手与理论并重，对设备维护、质量控制课程兴趣浓厚，但部分学生认为“管理”类课程枯燥。形势与政策教学中，需结合国家加强医疗器械全生命周期监管的政策背景，阐明质量控制、风险管理在保障用械安全中的核心作用。引导学生认识到，医疗器械维护与管理不仅是一项技术工作，更承担着守护公众健康的社会责任。结合“中国牙谷”产业发展，分析地方如何落实国家医疗器械审评审批制度改革，让学生理解政策落地对产业和职业的深远影响。教学中可融入职业伦理与法规教育，培养严谨细致、责任至上的职业素养，为国家医疗器械监管和产业高质量发展输送专业人才。`,
        "医疗器械经营与服务": `医疗器械经营与服务专业学情分析
本专业学生性格外向，沟通能力强，对市场营销、客户服务有浓厚兴趣，但容易将工作目标单纯定位于销售业绩。形势与政策课程需重点强化法规意识与行业伦理。教学中应结合《医疗器械监督管理条例》、流通领域“两票制”等政策，阐明合规经营、反腐倡廉是行业健康发展的底线。引导学生认识医疗器械经营不仅是商业活动，更关乎医疗质量与患者安全，需树立诚信为本、服务至上的理念。结合国家支持“互联网+医疗器械”流通新模式，拓宽学生职业视野。同时，融入医药领域反腐倡廉案例，帮助学生扣好职业生涯的“第一粒扣子”，培养知法守法、德才兼备的医疗器械营销人才。`,
        "计算机应用技术": `计算机应用技术专业学情分析
本专业学生动手能力强，对编程、网络技术有较高兴趣，但易将技术学习与价值观塑造割裂。形势与政策课程需引导学生理解“数字中国”战略对计算机人才的迫切需求，特别是信息技术在医疗健康领域的深度融合。结合《“十四五”全民健康信息化规划》，让学生看到医疗信息化、智慧医院建设中的就业机遇。同时，必须强化网络安全、数据安全法规教育，结合《数据安全法》《个人信息保护法》等，使学生认识到程序员代码背后是国家安全和个人隐私，培养正确的技术伦理观。教学中可融入国产软件自主创新案例，激发学生投身科技自立自强的责任感。`,
        "大数据技术": `大数据技术专业学情分析
本专业学生数学基础较好，对数据分析技术有探索欲，但容易将大数据视为纯粹技术工具，缺乏对国家数据战略的宏观认识。形势与政策教学中，需重点解读国家“数据作为生产要素”的政策理念，以及《“数据要素×”三年行动计划》等部署，阐明大数据在医疗健康、社会治理等领域的战略价值。引导学生认识健康医疗大数据是国家基础性战略资源，其安全治理、规范应用事关国家安全和人民福祉。结合医疗数据泄露、算法歧视等案例，强化数据伦理教育。教学中可引导学生探讨大数据如何赋能“中国牙谷”产业链升级，激发其用技术服务产业发展的热情，培养懂数据、懂医疗、懂国情的复合型人才。`,
        "健康大数据管理与服务": `健康大数据管理与服务专业学情分析
本专业学生关注健康领域，对数据与健康结合有较强学习动机，但医学基础薄弱，对健康数据管理的政策法规了解不多。形势与政策课程需系统解读国家在健康医疗大数据领域的政策布局，如《关于加强全民健康信息标准化体系建设的意见》等，帮助学生明确数据标准、互联互通的重要性。结合国家推动“互联网+医疗健康”、远程医疗等政策，让学生看到健康数据在优化资源配置、提升服务可及性中的关键作用。教学中需强化数据安全、隐私保护意识教育，引导学生理解健康数据管理不仅是一项技术工作，更承担着保障公民健康权益、维护国家安全的社会责任，培养既懂技术又懂政策的复合型人才。`,
        "电子商务": `电子商务专业学情分析
本专业学生思维活跃，创新意识强，对网络营销、直播带货等兴趣浓厚，但容易受短期流量思维影响，忽视合规经营与长期发展。形势与政策课程需重点引导学生理解国家规范平台经济发展、推动“数实融合”的政策导向。结合《电子商务法》《网络直播营销管理办法》等法规，阐明电商行业已进入依法治理、高质量发展的新阶段。教学中可聚焦医疗器械、健康产品电商的特殊监管要求，让学生认识从事健康类电商需更强的社会责任感。结合国家支持农村电商、跨境电商等政策，拓宽学生就业视野。引导学生将电商技能服务于实体经济，特别是口腔健康、医疗产品等实体产业，培养诚信经营、服务社会的电商人才。`,
        "医疗设备安装与维护": `医疗设备安装与维护专业学情分析
本专业学生动手能力强，职业定位务实，对设备安装调试有天然兴趣，但往往将工作视为单纯的“技术活”，缺乏对岗位战略价值的认识。形势与政策教学中，需结合国家“强化高端医疗设备自主可控”“提升产业链供应链韧性”的战略部署，阐明医疗设备安装维护人员是保障医疗设备正常运转、维护国家安全的关键一环。结合“中国牙谷”产业聚集区特点，让学生认识到自身工作在支撑地方产业发展、服务临床诊疗中的不可替代性。教学中需融入安全生产、质量强国教育，培养学生严谨细致、精益求精的工匠精神，引导其将个人技能提升与国家医疗装备产业高质量发展紧密结合。`,
        "口腔修复工艺": `口腔修复工艺专业学情分析
本专业学生审美能力较强，对义齿制作工艺有浓厚兴趣，对学院口腔特色有较强认同感，但易将职业发展局限于传统技工岗位。形势与政策课程需引导学生看到数字化技术对口腔修复工艺的重塑，结合国家“智能制造”“新质生产力”等政策，理解数字化设计、3D打印等技术正推动义齿加工从劳动密集型向技术密集型转变。结合医疗器械监管政策，让学生认识到义齿作为定制式医疗器械，其质量直接关系患者安全，必须依法依规生产。教学中可融入“大国工匠”典型案例，提升学生职业自豪感，引导其主动拥抱技术变革，成为掌握数字化修复技术的高素质技能人才，服务我国口腔修复工艺行业的转型升级。`
    };
    
    function getProfessionAnalysis(major) {
        return professionAnalysisMap[major] || `暂无该专业的详细学情分析，请参考总体概述或联系教研室补充。`;
    }
    
    // 渲染第一板块（下拉菜单方式）
    const professionSelect = document.getElementById("professionSelect");
    const detailContainer = document.getElementById("analysisDetailContainer");
    const showOverviewBtn = document.getElementById("showOverviewBtn");
    
    // 填充下拉菜单
    allMajors.forEach(major => {
        const option = document.createElement("option");
        option.value = major;
        option.textContent = major;
        professionSelect.appendChild(option);
    });
    
    // 显示选中专业的学情分析
    function showSelectedProfessionAnalysis() {
        const selectedMajor = professionSelect.value;
        const analysis = getProfessionAnalysis(selectedMajor);
        detailContainer.innerHTML = `<h3>📌 ${selectedMajor} · 学情分析</h3><p style="white-space: pre-line;">${analysis.replace(/\n/g, '<br>')}</p>`;
    }
    
    professionSelect.addEventListener("change", showSelectedProfessionAnalysis);
    showOverviewBtn.addEventListener("click", () => {
        detailContainer.innerHTML = `<h3>📌 总体学情概述</h3><p style="white-space: pre-line;">${overallAnalysis.replace(/\n/g, '<br>')}</p>`;
    });
    
    // 默认显示第一个专业的学情
    showSelectedProfessionAnalysis();
    
    // ------------------- 板块2：专业深度融合理念的定制教学方案 -------------------
    const topics = [
        { id: "topic1", title: "专题一 · 乘势而上、接续推进中国式现代化", theme: "modernization" },
        { id: "topic3", title: "专题三 · 深入推进数字中国建设", theme: "digital" },
        { id: "topic4", title: "专题四 · 新时代我国文化遗产保护的理念与实践", theme: "culture" }
    ];
    
    // 专业大类映射（确保体育保健与康复归入child_sports，康复治疗技术归入nursing_rehab）
    function getMajorCategory(major) {
        if (major.includes("口腔") || major.includes("修复")) return "stomatology";
        if (major === "护理") return "nursing_rehab";
        if (major === "康复治疗技术") return "nursing_rehab";
        if (major === "婴幼儿托育服务与管理") return "child_sports";
        if (major === "体育保健与康复") return "child_sports";
        if (major.includes("智能医疗") || major.includes("医疗器械") || major.includes("医疗设备")) return "medical_device";
        if (major.includes("计算机") || major.includes("大数据") || major.includes("健康大数据") || major.includes("电子商务")) return "it_ecom";
        return "general";
    }
    
    // 获取更细分的专业标识（用于生成差异化内容）
    function getMajorSubtype(major) {
        if (major === "口腔医学") return "clinical";
        if (major === "口腔医学技术") return "tech";
        if (major === "口腔卫生保健") return "prevention";
        if (major === "口腔修复工艺") return "tech";
        if (major === "护理") return "nursing";
        if (major === "康复治疗技术") return "rehab";
        if (major === "婴幼儿托育服务与管理") return "childcare";
        if (major === "体育保健与康复") return "sports";
        if (major === "智能医疗装备技术") return "device_tech";
        if (major === "医疗器械维护与管理") return "device_maint";
        if (major === "医疗器械经营与服务") return "device_sale";
        if (major === "医疗设备安装与维护") return "device_install";
        if (major === "计算机应用技术") return "cs";
        if (major === "大数据技术") return "bigdata";
        if (major === "健康大数据管理与服务") return "healthdata";
        if (major === "电子商务") return "ecom";
        return "general";
    }
    
    function getStats(major) {
        let baseTheory = 72, baseActivity = 68, basePractice = 70;
        if (major.includes("护理") || major.includes("康复") || major.includes("口腔")) {
            baseTheory = 78; baseActivity = 74; basePractice = 76;
        } else if (major.includes("大数据") || major.includes("计算机") || major.includes("智能医疗")) {
            baseTheory = 74; baseActivity = 72; basePractice = 68;
        } else if (major.includes("管理") || major.includes("服务") || major.includes("电子商务")) {
            baseTheory = 76; baseActivity = 79; basePractice = 73;
        } else if (major.includes("婴幼儿") || major.includes("体育")) {
            baseTheory = 73; baseActivity = 80; basePractice = 75;
        }
        return { theoryScore: baseTheory, active: baseActivity, caseEngage: basePractice };
    }
    
    // 生成深度差异化的授课侧重点（基于专业名称细分）
    function generateDeepFocus(major, topic) {
        const category = getMajorCategory(major);
        const subtype = getMajorSubtype(major);
        const theme = topic.theme;
        const stats = getStats(major);
        const theoryDesc = stats.theoryScore >= 78 ? "理论认知基础扎实" : (stats.theoryScore >= 68 ? "理论水平中等" : "理论底子偏弱");
        
        let focusText = `📌 学情适配：该专业学生${theoryDesc}，对专业相关政策兴趣浓厚。\n\n`;

                } else {

                }
            }

    function renderTeachingPanel(major) {
        const container = document.getElementById("chapterDetailsPanel");
        let html = `<div class="chapters-container">`;
        for (let topic of topics) {
            const focusText = generateDeepFocus(major, topic);
            const questions = generateQuestions(major, topic);
            html += `
                <div class="chapter-card">
                    <div class="chapter-title">${topic.title}</div>
                    <div class="focus-area" style="white-space: pre-line;">${focusText.replace(/\n/g, '<br>')}</div>
                    <div style="margin-top:1rem;"><strong>🔍 该专业学生可能针对本章提出的三个典型问题：</strong></div>
                    <ul class="questions-list">
                        ${questions.map(q => `<li>❓ ${q}</li>`).join('')}
                    </ul>
                </div>
            `;
        }
        html += `</div>`;
        container.innerHTML = html;
    }
    
    function populateSelect() {
        const select = document.getElementById("majorSelect");
        select.innerHTML = "";
        allMajors.forEach(major => {
            const option = document.createElement("option");
            option.value = major;
            option.textContent = major;
            select.appendChild(option);
        });
        select.value = allMajors[0];
        renderTeachingPanel(allMajors[0]);
        select.addEventListener("change", (e) => renderTeachingPanel(e.target.value));
    }

    function getLevel(value, type) {
        if (type === 'score') {
            if (value <= 3) return 'low';
            if (value <= 6) return 'medium';
            return 'high';
        }
        if (type === 'percent') {
            if (value <= 60) return 'veryLow';
            if (value <= 70) return 'low';
            if (value <= 80) return 'medium';
            if (value <= 90) return 'high';
            return 'veryHigh';
        }
        return 'medium';
    }

                return `【${metricName}偏低】当前${metricName}为${value}%，完成情况不佳。建议优化作业设计：减少机械抄写，增加实践类任务（如“调研身边的口腔诊所数字化程度”“拍摄非遗文化短视频”）；建立学习小组互相督促，组长每周汇总完成情况；每次作业后利用5分钟简要点评并展示优秀作业，树立榜样。同时可设置“作业进步奖”激励后进学生。`;
            } else if (level === 'medium') {
                return `【${metricName}中等】当前${metricName}为${value}%，仍有提升空间。可引入“作业互评”机制，学生交换批改并写评语，培养责任意识；增设“挑战性附加题”，对完成优秀者给予平时分奖励；利用数字化平台发布作业提醒和参考答案，帮助学生及时纠错。同时可定期组织“作业经验分享会”，让优秀学生传授方法。`;
            } else if (level === 'high') {
                return `【${metricName}较好】当前${metricName}为${value}%，保持稳定。建议增加开放性、探究性任务，如“政策建议书”“行业分析报告”；鼓励学生将作业成果投稿至班级公众号或院系平台，扩大影响力。同时可试点“免作业券”奖励，对连续多次优秀学生给予一次免做机会，激发更高热情。`;
            } else {
                return `【${metricName}优秀】当前${metricName}为${value}%，完成率极高。可在此基础上增设“学术拓展任务”，对接真实行业课题（如“中国牙谷”产业数据分析），培养学生高阶能力。同时组织“优秀作业展”，邀请专业教师、企业导师参与点评，增强学生成就感与专业认同。`;
            }
        }
    }
    
    function analyzeClassroom() {
        let atmosphere = parseFloat(document.getElementById("atmosphere").value);
        let interaction = parseFloat(document.getElementById("interaction").value);
        let homeworkRate = parseFloat(document.getElementById("homeworkRate").value);
        let attendance = parseFloat(document.getElementById("attendance").value);
        if (isNaN(atmosphere)) atmosphere = 5;
        if (isNaN(interaction)) interaction = 5;
        if (isNaN(homeworkRate)) homeworkRate = 75;
        if (isNaN(attendance)) attendance = 85;
        
        const atmLevel = getLevel(atmosphere, 'score');
        const intLevel = getLevel(interaction, 'score');
        const hwLevel = getLevel(homeworkRate, 'percent');
        const attLevel = getLevel(attendance, 'percent');
        
        let suggestions = "";
        suggestions += getAdviceForMetric("课堂氛围", atmosphere, atmLevel, 'score') + "\n\n";
        suggestions += getAdviceForMetric("课堂互动程度", interaction, intLevel, 'score') + "\n\n";
        suggestions += getAdviceForMetric("课堂作业完成率", homeworkRate, hwLevel, 'percent') + "\n\n";
        suggestions += getAdviceForMetric("课堂出勤率", attendance, attLevel, 'percent') + "\n\n";
        
        suggestions += `【系统性整合与特色资源利用】\n`;
        suggestions += `• 充分利用学院“中国牙谷”区位优势，开发“口腔健康与现代化”“医疗器械国产化”等校本案例库，使思政课内容与专业认知深度融合。\n`;
        suggestions += `• 依托华西专家资源，邀请临床医生、企业技术骨干进课堂开展“实战对话”，用真实职业场景解答学生困惑。\n`;
        suggestions += `• 建立“班级学习共同体”，每个学生加入学习小组，形成互助互促机制。\n`;
        suggestions += `• 利用数字化工具（学习通/雨课堂）实现签到、互动、作业全流程数据化，定期向学生反馈个人学习画像，激发自我提升动力。\n`;
        suggestions += `• 建议在每次课程结束后对课堂数据进行简要复盘，对比改进前后变化，持续优化教学策略。`;
        
        const weaknesses = [];
        if (atmosphere <= 6) weaknesses.push(`课堂氛围得分${atmosphere}/10，整体偏沉闷`);
        else weaknesses.push(`课堂氛围得分${atmosphere}/10，表现尚可，仍有提升空间`);
        if (interaction <= 6) weaknesses.push(`互动程度得分${interaction}/10，学生参与积极性不足`);
        else weaknesses.push(`互动程度得分${interaction}/10，有一定互动基础`);
        if (homeworkRate <= 80) weaknesses.push(`作业完成率${homeworkRate}%，课后巩固薄弱`);
        else weaknesses.push(`作业完成率${homeworkRate}%，保持良好`);
        if (attendance <= 90) weaknesses.push(`出勤率${attendance}%，存在缺勤或迟到`);
        else weaknesses.push(`出勤率${attendance}%，出勤稳定`);
        
        const resultHtml = `
            <h4>📉 课堂不足诊断</h4>
            <ul><li>${weaknesses.join("</li><li>")}</li></ul>
            <h4>✨ 改进策略</h4>
            <div style="white-space: pre-line; line-height: 1.6;">${suggestions}</div>
            <hr><p style="font-size:0.85rem; margin-top:0.5rem;">⭐ 以上策略基于课堂数据分层生成，建议结合班级实际情况分步实施，持续跟踪效果并动态调整。</p>
        `;
        document.getElementById("improvementResult").innerHTML = resultHtml;
    }
    
    function init() {
        populateSelect();
        document.getElementById("analyzeBtn").addEventListener("click", analyzeClassroom);
        analyzeClassroom();
    }
    init();
</script>
</body>
</html>
